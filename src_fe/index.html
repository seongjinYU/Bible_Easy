<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Easy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📖 Bible Easy</h1>
        <p class="subtitle">성경 구절 자동완성 유틸리티</p>

        <div class="status-box">
            <p class="status-text">✅ 실행 중</p>
            <p class="hint">이 앱이 실행되는 동안 모든 앱에서 기능이 작동합니다</p>
        </div>

        <div class="info-box">
            <h4>📚 사용법</h4>
            <p>어디서든 아래 형식으로 입력하고 <strong>Enter</strong>를 누르세요</p>
            <ul>
                <li><code>#창 1:1</code> → 창세기 1장 1절</li>
                <li><code>#요 3:16</code> → 요한복음 3장 16절</li>
                <li><code>#시 23:1</code> → 시편 23편 1절</li>
                <li><code>#계 21:1</code> → 요한계시록 21장 1절</li>
            </ul>
            <p class="hint"><code>#</code> 뒤에 공백 없이 입력하세요</p>
        </div>

        <div class="info-box">
            <h4>ℹ️ 안내</h4>
            <ul>
                <li>앱을 종료하려면 이 창을 닫으세요</li>
                <li>백그라운드 실행은 시스템 트레이에서 확인할 수 있습니다</li>
            </ul>
        </div>
    </div>
</body>
</html>
