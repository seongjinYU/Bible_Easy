<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Easy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📖 Bible Easy</h1>
        <p>성경 구절 자동완성 유틸리티</p>

        <div class="status">
            <h3>🚀 개발 진행 상황</h3>
            <ul class="todo-list">
                <li class="done">✅ 개발 환경 구축 완료</li>
                <li class="done">✅ Tauri 프로젝트 초기화 완료</li>
                <li class="pending">⏳ 성경 데이터베이스 구축 예정</li>
                <li class="pending">⏳ 키보드 후킹 구현 예정</li>
                <li class="pending">⏳ 패턴 분석 엔진 구현 예정</li>
            </ul>
        </div>

        <div class="info-box">
            <h4>📚 사용 예정 기능</h4>
            <p>텍스트 필드에 <code>#창 1:1</code>를 입력하고 스페이스바를 누르면</p>
            <p>→ <strong>"태초에 하나님이 천지를 창조하시니라"</strong></p>
            <p>자동으로 변환됩니다!</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
